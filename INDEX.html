<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Start Page</title>
<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: #000;
  color: white;
  min-height: 100vh;
  padding: 20px 14px 40px;
}

.search-wrap {
  margin-top: 40px;
  margin-bottom: 28px;
}

.search {
  width: 100%;
  height: 56px;
  border-radius: 28px;
  border: none;
  outline: none;
  padding: 0 22px;
  font-size: 18px;
  background: #1b1b1b;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px 10px;
}

.item {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.icon {
  width: 64px;
  height: 64px;
  border-radius: 20px;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  overflow: hidden;
  margin-bottom: 8px;
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.label {
  font-size: 13px;
  text-align: center;
  line-height: 1.3;
  word-break: keep-all;
}

.add-btn {
  position: fixed;
  right: 18px;
  bottom: 24px;
  width: 62px;
  height: 62px;
  border-radius: 50%;
  border: none;
  background: white;
  color: black;
  font-size: 36px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.menu {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.panel {
  width: 100%;
  max-width: 420px;
  background: #161616;
  border-radius: 24px;
  padding: 20px;
}

.panel h2 {
  margin-top: 0;
}

.input {
  width: 100%;
  height: 48px;
  border-radius: 14px;
  border: none;
  margin-bottom: 12px;
  padding: 0 14px;
  background: #262626;
  color: white;
  font-size: 16px;
}

.save {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 16px;
  background: white;
  color: black;
  font-size: 17px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="search-wrap">
  <input class="search" placeholder="검색 또는 URL 입력">
</div>

<div class="grid" id="grid"></div>

<button class="add-btn" onclick="openMenu()">+</button>

<div class="menu" id="menu">
  <div class="panel">
    <h2>바로가기 추가</h2>
    <input class="input" id="title" placeholder="이름">
    <input class="input" id="url" placeholder="https://example.com">
    <button class="save" onclick="saveShortcut()">저장</button>
  </div>
</div>

<script>
const grid = document.getElementById('grid');
const menu = document.getElementById('menu');

let shortcuts = JSON.parse(localStorage.getItem('shortcuts') || 'null');

if (!shortcuts) {
  shortcuts = [
    { title: 'Google', url: 'https://google.com' },
    { title: 'YouTube', url: 'https://youtube.com' },
    { title: 'Naver', url: 'https://naver.com' },
    { title: 'MLBPARK', url: 'https://mlbpark.donga.com' }
  ];
}

function getIcon(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=128`;
  } catch {
    return '';
  }
}

function render() {
  grid.innerHTML = '';

  shortcuts.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <div class="icon">
        <img src="${getIcon(s.url)}">
      </div>
      <div class="label">${s.title}</div>
    `;

    div.onclick = () => {
      location.href = s.url;
    };

    div.oncontextmenu = (e) => {
      e.preventDefault();

      if (confirm(`${s.title} 삭제할까요?`)) {
        shortcuts.splice(i, 1);
        save();
      }
    };

    grid.appendChild(div);
  });
}

function save() {
  localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
  render();
}

function openMenu() {
  menu.style.display = 'flex';
}

menu.onclick = (e) => {
  if (e.target === menu) {
    menu.style.display = 'none';
  }
};

function saveShortcut() {
  const title = document.getElementById('title').value.trim();
  let url = document.getElementById('url').value.trim();

  if (!title || !url) return;

  if (!url.startsWith('http')) {
    url = 'https://' + url;
  }

  shortcuts.push({ title, url });
  save();

  document.getElementById('title').value = '';
  document.getElementById('url').value = '';

  menu.style.display = 'none';
}

render();

const search = document.querySelector('.search');

search.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const q = search.value.trim();

    if (q.startsWith('http') || q.includes('.')) {
      location.href = q.startsWith('http') ? q : 'https://' + q;
    } else {
      location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
    }
  }
});
</script>

</body>
</html>
